name: CI Pipeline

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  check-signatures:
    name: Check Commit Signatures
    # Only run this job on pull requests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: Verify all commits are signed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking signature verification status for PR #${{ github.event.pull_request.number }}..."
          
          # Fetch all commits in the current Pull Request using GitHub API
          commits=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits)
          
          # Count how many commits are NOT verified
          unverified=$(echo "$commits" | jq '[.[] | select(.commit.verification.verified == false)] | length')
          
          if [ "$unverified" -gt 0 ]; then
            echo "❌ Error: Found $unverified unverified/unsigned commit(s)."
            echo "Please ensure all commits in this Pull Request are signed (e.g., using GPG, SSH, or S/MIME)."
            exit 1
          fi
          
          echo "✅ All commits are verified and signed."

  lint:
    name: Run Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Clean install)
        run: npm ci

      - name: Check Linting Rules
        run: npm run lint

  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Clean install)
        run: npm ci

      - name: Test Production Build
        run: npm run build